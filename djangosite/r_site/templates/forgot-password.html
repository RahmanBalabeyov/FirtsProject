{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <div class="card" style="text-align: center;">
        <div style="width: 64px; height: 64px; background: #fff4ec; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px;">🔒</div>
        <h2 style="font-size: 18px; margin: 0 0 8px;">Şifrəni unutmusan?</h2>
        <p style="color: #6b7280; font-size: 14px; margin: 0 0 24px;">
            Emailinizi daxil edin, sizə bərpa linki göndərək.
        </p>

        <form style="display: flex; flex-direction: column; gap: 14px;">
            <input type="text" class="input" placeholder="Email və ya istifadəçi adı">
            <button type="submit" class="btn">Bərpa linki göndər</button>
        </form>

        <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid #e5e7eb;">
            <a href="{% url 'Login' %}" style="font-size: 14px; font-weight: 600;">← Giriş səhifəsinə qayıt</a>
        </div>
    </div>
</div>
{% endblock %}
