{% extends 'base.html' %}

{% block content %}
<div style="max-width: 350px; margin: 40px auto; text-align: center;">
    <div style="background: white; border: 1px solid #dbdbdb; padding: 40px;">
        <div style="font-size: 50px; margin-bottom: 15px;">🔒</div>
        <h2 style="font-size: 16px; margin-bottom: 10px;">Giriş etməkdə çətinlik çəkirsiniz?</h2>
        <p style="color: #8e8e8e; font-size: 14px; margin-bottom: 20px;">Emailinizi daxil edin və biz sizə hesabınıza daxil olmaq üçün link göndərək.</p>
        
        <form style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" placeholder="Email və ya İstifadəçi adı" style="padding: 10px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px;">
            <button type="submit" style="background: #0095f6; color: white; border: none; padding: 7px; border-radius: 4px; font-weight: bold; cursor: pointer;">Giriş Linki Göndər</button>
        </form>
        
        <div style="margin-top: 20px; border-top: 1px solid #dbdbdb; padding-top: 20px;">
            <a href="{% url 'Login' %}" style="color: #262626; font-size: 14px; text-decoration: none; font-weight: bold;">Giriş səhifəsinə qayıt</a>
        </div>
    </div>
</div>
{% endblock %}
