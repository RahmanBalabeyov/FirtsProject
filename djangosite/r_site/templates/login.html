{% extends 'base.html' %}

{% block content %}
<div style="max-width: 350px; margin: 40px auto; text-align: center;">
    <div style="background: white; border: 1px solid #dbdbdb; padding: 40px; margin-bottom: 10px;">
        <h1 style="font-family: 'Arial', sans-serif; font-size: 35px; margin-bottom: 30px;">BR</h1>
        
        <form style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" placeholder="İstifadəçi adı və ya email" style="padding: 10px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px;">
            <input type="password" placeholder="Şifrə" style="padding: 10px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px;">
            <button type="submit" style="background: #0095f6; color: white; border: none; padding: 7px; border-radius: 4px; font-weight: bold; cursor: pointer;">Giriş Et</button>
        </form>

        <div style="margin-top: 20px;">
            <a href="{% url 'ForgotPassword' %}" style="color: #00376b; font-size: 12px; text-decoration: none;">Şifrəni unutmusan?</a>
        </div>
    </div>

    <div style="background: white; border: 1px solid #dbdbdb; padding: 20px;">
        <p style="font-size: 14px;">Hesabın yoxdur? <a href="{% url 'Register' %}" style="color: #0095f6; text-decoration: none; font-weight: bold;">Qeydiyyatdan keç</a></p>
    </div>
</div>
{% endblock %}
