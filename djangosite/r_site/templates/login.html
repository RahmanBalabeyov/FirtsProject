{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <div class="card">
        <h1 style="text-align: center; color: #ff6b1a; font-size: 32px; margin: 0 0 8px;">BR</h1>
        <p style="text-align: center; color: #6b7280; font-size: 14px; margin: 0 0 28px;">Hesabınıza daxil olun</p>

       <form method="POST">
    {% csrf_token %}
    
    {% for field in form %}
        <div>
            {{ field.label_tag }} <br>
            {{ field }}
        </div>
    {% endfor %}
    
    <button type="submit">Giriş et</button>
</form>
        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'ForgotPassword' %}" style="font-size: 13px;">Şifrəni unutmusan?</a>
        </div>
    </div>

    <div class="card" style="margin-top: 16px; text-align: center; padding: 20px;">
        <p style="font-size: 14px; margin: 0; color: #6b7280;">
            Hesabın yoxdur? <a href="{% url 'Register' %}" style="font-weight: 600;">Qeydiyyatdan keç</a>
        </p>
    </div>
</div>
{% endblock %}
