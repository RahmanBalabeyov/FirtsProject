{% load static %}
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Social</title>
    <style>
        :root {
            --primary: #ff6b1a;
            --primary-dark: #e55a0c;
            --primary-light: #fff4ec;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #fafafa;
            --white: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-dark); }

        /* Navbar */
        .navbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
        }
        .navbar .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .navbar .links { display: flex; gap: 8px; align-items: center; }
        .navbar .links a {
            color: var(--text);
            font-weight: 500;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.15s;
        }
        .navbar .links a:hover { background: var(--primary-light); color: var(--primary); }
        .navbar .links a.btn-primary {
            background: var(--primary);
            color: var(--white);
        }
        .navbar .links a.btn-primary:hover { background: var(--primary-dark); color: var(--white); }

        .content {
            margin-top: 64px;
            min-height: calc(100vh - 64px);
            padding: 32px 16px;
        }

        /* Reusable */
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
            text-align: center;
        }
        .btn:hover { background: var(--primary-dark); color: var(--white); }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-outline:hover { background: var(--primary-light); }
        .input {
            width: 100%;
            padding: 12px 14px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }
        .input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'Home' %}" class="logo">BR</a>
        <div class="links">
            <a href="{% url 'Home' %}">Ana səhifə</a>
            <a href="{% url 'Profile' %}">Profil</a>
            <a href="{% url 'Login' %}">Giriş</a>
            <a href="{% url 'Register' %}" class="btn-primary">Qeydiyyat</a>
        </div>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
