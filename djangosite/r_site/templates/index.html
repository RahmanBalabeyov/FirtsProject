{% extends 'base.html' %}

{% block content %}
<style>
    .feed { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .post {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
    }
    .post-header {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        gap: 12px;
    }
    .avatar {
        width: 40px; height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff6b1a, #ffa366);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-weight: 700; font-size: 14px;
    }
    .post-user { font-weight: 600; font-size: 14px; color: #1a1a1a; }
    .post-time { font-size: 12px; color: #6b7280; }
    .post-body { padding: 0 20px 16px; font-size: 15px; line-height: 1.6; color: #1a1a1a; }
    .post-image { width: 100%; display: block; }
    .post-actions {
        display: flex;
        gap: 8px;
        padding: 12px 20px;
        border-top: 1px solid #f3f4f6;
    }
    .action {
        background: none;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        color: #6b7280;
        cursor: pointer;
        display: flex; align-items: center; gap: 6px;
    }
    .action:hover { background: #fff4ec; color: #ff6b1a; }
    .post-stats { padding: 0 20px 12px; font-size: 13px; color: #6b7280; }
    .post-stats strong { color: #1a1a1a; }
    .comment-box {
        display: flex;
        padding: 12px 20px;
        border-top: 1px solid #f3f4f6;
        gap: 8px;
    }
    .comment-box input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 14px;
        background: transparent;
    }
    .comment-box button {
        background: none;
        border: none;
        color: #ff6b1a;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
    }
    .feed-header {
        max-width: 600px;
        margin: 0 auto 24px;
    }
    .feed-header h1 {
        font-size: 24px;
        margin: 0 0 4px;
        color: #1a1a1a;
    }
    .feed-header p { color: #6b7280; margin: 0; font-size: 14px; }
</style>

<div class="feed-header">
    <h1>Ana səhifə</h1>
    <p>Ən son paylaşımlar</p>
</div>

<div class="feed">

    <article class="post">
        <div class="post-header">
            <div class="avatar">RD</div>
            <div>
                <div class="post-user">rahman_dev</div>
                <div class="post-time">2 saat öncə</div>
            </div>
        </div>
        <div class="post-body">
            Bu gün ilk Django layihəmin ana səhifəsini hazırlayıram. 🚀 #django #python
        </div>
        <div class="post-stats"><strong>42</strong> bəyənmə · <strong>5</strong> şərh</div>
        <div class="post-actions">
            <button class="action">♥ Bəyən</button>
            <button class="action">💬 Şərh</button>
            <button class="action">↗ Paylaş</button>
        </div>
        <div class="comment-box">
            <input type="text" placeholder="Şərh yaz...">
            <button>Göndər</button>
        </div>
    </article>

    <article class="post">
        <div class="post-header">
            <div class="avatar">AC</div>
            <div>
                <div class="post-user">ali_coder</div>
                <div class="post-time">5 saat öncə</div>
            </div>
        </div>
        <img src="https://via.placeholder.com/600x400/ff6b1a/ffffff?text=BR" alt="Post" class="post-image">
        <div class="post-body">Manzara çox gözəldir.</div>
        <div class="post-stats"><strong>105</strong> bəyənmə · <strong>12</strong> şərh</div>
        <div class="post-actions">
            <button class="action">♥ Bəyən</button>
            <button class="action">💬 Şərh</button>
            <button class="action">↗ Paylaş</button>
        </div>
        <div class="comment-box">
            <input type="text" placeholder="Şərh yaz...">
            <button>Göndər</button>
        </div>
    </article>

</div>
{% endblock %}
