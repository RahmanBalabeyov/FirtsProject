{% extends 'base.html' %}

{% block content %}
<style>
    .profile { max-width: 900px; margin: 0 auto; }
    .profile-header {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 32px;
        display: flex;
        gap: 32px;
        align-items: center;
        margin-bottom: 24px;
    }
    .profile-avatar {
        width: 140px; height: 140px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff6b1a, #ffa366);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 48px; font-weight: 700;
        flex-shrink: 0;
    }
    .profile-info h2 { margin: 0 0 4px; font-size: 28px; }
    .profile-info .username { color: #6b7280; font-size: 14px; margin-bottom: 16px; }
    .profile-stats { display: flex; gap: 24px; margin-bottom: 20px; }
    .profile-stats div { font-size: 14px; color: #6b7280; }
    .profile-stats strong { color: #1a1a1a; font-size: 18px; display: block; }
    .profile-actions { display: flex; gap: 10px; }

    .tabs {
        display: flex;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 6px;
        gap: 4px;
        margin-bottom: 20px;
    }
    .tab {
        flex: 1;
        background: none;
        border: none;
        padding: 12px;
        font-size: 13px;
        font-weight: 600;
        color: #6b7280;
        cursor: pointer;
        border-radius: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .tab.active, .tab:hover {
        background: #fff4ec;
        color: #ff6b1a;
    }

    .empty {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 60px 20px;
        text-align: center;
        color: #6b7280;
    }
</style>

<div class="profile">
    <div class="profile-header">
        <div class="profile-avatar">R</div>
        <div class="profile-info" style="flex: 1;">
            <h2>Rahman</h2>
            <div class="username">@rahman_user</div>
            <div class="profile-stats">
                <div><strong>0</strong> Paylaşım</div>
                <div><strong>0</strong> İzləyici</div>
                <div><strong>0</strong> İzlənilən</div>
            </div>
            <div class="profile-actions">
                <button class="btn">Profili Redaktə Et</button>
                <button class="btn btn-outline">Profil şəklini dəyiş</button>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active">Postlarım</button>
        <button class="tab">Saxlanılan</button>
        <button class="tab">Bəyəndiklərim</button>
        <button class="tab">Şərhlərim</button>
    </div>

    <div class="empty">
        <p style="margin: 0;">Hələlik heç bir paylaşım yoxdur.</p>
    </div>
</div>
{% endblock %}
